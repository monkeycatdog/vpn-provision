mixed-port: 7890
external-controller: 127.0.0.1:9090
log-level: info
proxies:
  - name: "ss-dead"
    type: ss
    server: 192.0.2.1
    port: 8388
    cipher: chacha20-ietf-poly1305
    password: notreal
  - name: "direct-out"
    type: direct
  # Corporate egress via the openvpn-corp sidecar's SOCKS5 (profile: corp).
  # When the sidecar is not running this proxy is simply never dialed.
  - name: "ovpn-corp"
    type: socks5
    server: 127.0.0.1
    port: 1080
    udp: false
proxy-groups:
  - name: GLOBAL
    type: fallback
    proxies: [ss-dead, direct-out]
    url: 'http://www.gstatic.com/generate_204'
    interval: 30
    lazy: false
listeners:
  - name: hy2-in
    type: hysteria2
    port: 8443
    listen: 0.0.0.0
    users:
      laptop: testpassword123
    up: 100
    down: 100
    alpn: [h3]
    certificate: /root/.config/mihomo/cert/server.crt
    private-key: /root/.config/mihomo/cert/server.key
rules:
  - MATCH,GLOBAL
